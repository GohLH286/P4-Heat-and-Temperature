.wrap{max-width:920px;margin:0 auto;padding:20px 16px 40px;}
h1,h2,.disp{font-family:Arial, Helvetica, sans-serif;}
h1{font-size:26pt;margin:0;font-weight:700;}
.sub{font-size:12pt;color:#0E3A4D;}
.topbar{display:flex;align-items:center;gap:12px;justify-content:space-between;flex-wrap:wrap;margin-bottom:6px;}
.brand{display:flex;align-items:center;gap:12px;}
.logo{width:42px;height:42px;border-radius:10px;background:var(--ink);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.headerbtns{display:flex;align-items:center;gap:10px;}
#saveStatus{font-size:12pt;color:var(--muted);}
.resetBtn{font-family:Arial, Helvetica, sans-serif;font-size:12pt;font-weight:600;color:var(--ember);background:transparent;border:1.5px solid var(--line);border-radius:8px;padding:6px 10px;cursor:pointer;}
.metabar{display:flex;gap:16px;flex-wrap:wrap;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:12px 16px;margin:16px 0;}
.metarow{display:flex;align-items:center;gap:6px;font-family:Arial, Helvetica, sans-serif;font-size:12pt;font-weight:600;}
.metarow input{font-family:Arial, Helvetica, sans-serif;font-size:12pt;color:var(--ember);border:none;border-bottom:2px solid var(--ink);background:transparent;outline:none;padding:2px 4px;min-width:120px;}
.tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.tabbtn{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;font-family:Arial, Helvetica, sans-serif;font-weight:600;font-size:12pt;}
.tabbtn.active{background:var(--ink);color:var(--paper);border:2px solid var(--ink);}
.tabbtn .sub2{font-weight:400;opacity:0.85;}
.card{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:18px;box-shadow:0 1px 0 rgba(30,60,90,0.05);}
.card h2{display:flex;align-items:center;gap:8px;font-size:16pt;font-weight:700;margin:0 0 10px;}
.card p{font-size:12pt;line-height:1.7;margin:0 0 10px;}
.muted{color:var(--muted);font-size:12pt;}
.blank{font-family:Arial, Helvetica, sans-serif;font-size:12pt;color:var(--ember);border:none;border-bottom:2px solid var(--ink);border-radius:0;background:transparent;outline:none;text-align:center;margin:0 4px;padding:1px 2px;}
select.blank{border:2px solid var(--ink);border-radius:6px;background:#fff;padding:2px 4px;font-size:12pt;}
table{border-collapse:collapse;width:100%;}
th{font-family:Arial, Helvetica, sans-serif;font-size:12pt;font-weight:600;text-align:center;padding:8px 10px;border-bottom:2px solid var(--ink);}
td{text-align:center;padding:6px 8px;border-bottom:1px solid var(--line);font-size:12pt;}
tr.odd{background:#F2F8FB;}
.tblwrap{overflow-x:auto;}
.tinput{width:64px;text-align:center;font-family:Arial, Helvetica, sans-serif;font-size:12pt;border:1.5px solid var(--line);border-radius:6px;padding:3px 2px;outline:none;}
.imgblock{text-align:center;margin-top:14px;}
.imgblock img{max-width:100%;width:600px;border-radius:10px;border:1.5px solid var(--line);}
.imgcap{font-size:11pt;color:var(--muted);margin-top:6px;}
.thermos{display:flex;gap:10px;}
.thermolabel{font-size:11pt;color:var(--muted);text-align:center;margin-top:4px;}
.thermoval{font-family:Arial, Helvetica, sans-serif;font-weight:700;font-size:12pt;text-align:center;}
.gaugewrap{display:flex;flex-direction:column;align-items:center;width:64px;}
.recordrow{display:flex;gap:22px;flex-wrap:wrap;align-items:flex-start;}
.submitbtn{font-family:Arial, Helvetica, sans-serif;font-weight:600;font-size:12pt;padding:10px 22px;border-radius:10px;border:2px solid var(--ink);background:#9AD0BE;color:var(--ink);cursor:pointer;}
.submitwrap{text-align:center;margin-top:24px;}
#submitStatus{display:block;margin-top:10px;font-size:11pt;color:#0E3A4D;font-weight:600;}
svg text{font-family:Arial, Helvetica, sans-serif;}
.introrow{display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
.introrow .introtext{flex:1;min-width:220px;}
.introrow .introart{flex-shrink:0;}
.concludeart{display:flex;flex-direction:column;align-items:center;text-align:center;margin-top:14px;}
</style>

      '</g>';
  }
  s += '</g>';

  // row of yellow cups A-E above the mat
  for (var j = 0; j < 5; j++) {
    var cx = 55 + j * 43;
    s += '<g transform="translate(' + cx + ',144)">' +
      '<path d="M-15 0 L15 0 L12 34 Q0 40 -12 34 Z" fill="#F0C23A" stroke="#16222A" stroke-width="2"/>' +
      '<ellipse cx="0" cy="0" rx="15" ry="4" fill="#D9A82A"/>' +
      '<text x="0" y="21" font-size="15" font-weight="700" fill="#16222A" text-anchor="middle">' + letters[j] + '</text>' +
      '</g>';
  }

  // data logger measuring temperature, with probe wires into C1 and C2
  s += dataLoggerSvg(353, 130);
  s += '<path d="M341 152 Q334 156 330 162" stroke="#16222A" stroke-width="2.2" fill="none"/>';
  s += '<path d="M365 152 Q372 156 376 162" stroke="#16222A" stroke-width="2.2" fill="none"/>';

  // C1 / C2 blue cups with black covers
  s += cupSvg(330, 162, "C1", "", true);
  s += cupSvg(376, 162, "C2", "", true);

  // three black plastic cover discs + stopper, lying flat
  s += '<ellipse cx="440" cy="215" rx="16" ry="5" fill="#2A2E33" stroke="#16222A" stroke-width="1.6"/>';
  s += '<ellipse cx="466" cy="222" rx="16" ry="5" fill="#2A2E33" stroke="#16222A" stroke-width="1.6"/>';
  s += '<rect x="428" y="226" width="8" height="12" rx="2" fill="#B9C2C8" stroke="#16222A" stroke-width="1.4"/>';

  // clear plastic container
  s += '<rect x="500" y="148" width="72" height="56" rx="9" fill="#EAF7FC" fill-opacity="0.55" stroke="#7FB4CC" stroke-width="2.4"/>';
  s += '<ellipse cx="536" cy="148" rx="36" ry="7" fill="#EAF7FC" fill-opacity="0.75" stroke="#7FB4CC" stroke-width="2"/>';

  // two rubber bands
  s += '<ellipse cx="596" cy="206" rx="16" ry="16" fill="none" stroke="#16222A" stroke-width="4"/>';
  s += '<ellipse cx="596" cy="206" rx="16" ry="16" fill="none" stroke="#3B3F44" stroke-width="2"/>';
  s += '<ellipse cx="628" cy="214" rx="14" ry="14" fill="none" stroke="#16222A" stroke-width="4"/>';
  s += '<ellipse cx="628" cy="214" rx="14" ry="14" fill="none" stroke="#3B3F44" stroke-width="2"/>';

  // black foam square + white cloth
  s += '<rect x="580" y="232" width="40" height="26" rx="3" fill="#2A2E33" stroke="#16222A" stroke-width="1.6"/>';
  s += '<path d="M624 236 Q650 228 668 242 Q656 254 636 252 Q622 248 624 236 Z" fill="#F3F6F7" stroke="#C7D2D6" stroke-width="1.4"/>';

  // simple handheld temperature-sensing tool (original design, not the branded gun)
  s += '<g transform="translate(65,247)">' +
    '<rect x="-10" y="-8" width="60" height="26" rx="10" fill="#D9603B" stroke="#16222A" stroke-width="2.2"/>' +
    '<circle cx="-14" cy="5" r="14" fill="#2A2E33" stroke="#16222A" stroke-width="2.2"/>' +
    '<rect x="34" y="-4" width="16" height="16" rx="3" fill="#EAF3F8" stroke="#16222A" stroke-width="1.6"/>' +
    '<circle cx="42" cy="4" r="4" fill="#0E3A4D"/>' +
    '</g>';

  s += '</svg>';
  return s;
}

var CONFIG = {
  exp3: {
    labelA: "Cup Cl", labelB: "Plastic container",
    colorA: "#D9603B", colorB: "#2F7A93",
    image: EXP3_SETUP_IMAGE,
    caption: "Set-up: Cup Cl (water at 50°C) placed inside the plastic container (water at 20°C), with temperature sensors connected to a data logger.",
    sceneSvg: exp3SceneSvg(),
    illustrationCaption: "How heat flows from the hotter cup Cl to the colder plastic container."
  },
  exp4: {
    labelA: "Cup C1", labelB: "Cup C2",
    colorA: "#D9603B", colorB: "#2F7A93",
    hotOrCold: "hot",
    image: EXP4_SETUP_IMAGE,
    caption: "Set-up: Cup C1 and Cup C2, each with hot water at 60°C, sealed with a plastic cover and stopper, placed in a plastic container. Temperature sensors connected to a data logger measure both cups.",
    sceneSvg: exp4SceneSvg(),
    illustrationCaption: "A good conductor lets heat pass through quickly; a poor conductor slows heat down."
  },
  exp5: {
    labelA: "Cup C1", labelB: "Cup C2",
    colorA: "#D9603B", colorB: "#2F7A93",
    hotOrCold: "cold",
    image: EXP5_SETUP_IMAGE,
    caption: "Set-up: Cup C1 and Cup C2, each with cold water at 6°C, placed in a plastic container. Temperature sensors connected to a data logger measure both cups.",
    sceneSvg: exp5SceneSvg(),
    illustrationCaption: "A good conductor lets heat pass through quickly; a poor conductor slows heat down."
  }
};

/* ---------- helpers to build markup ---------- */
function tableRowsHtml(tabId, dataA, dataB, colorA, colorB) {
  var rows = "";
  for (var i = 0; i < TIMES.length; i++) {
    rows += '<tr class="' + (i % 2 ? "odd" : "") + '">' +
      '<td>' + TIMES[i] + '</td>' +
      '<td><input class="tinput" style="color:' + colorA + '" type="number" data-tab="' + tabId + '" data-vessel="a" data-idx="' + i + '" value="' + dataA[i] + '" placeholder="—"/></td>' +
      '<td><input class="tinput" style="color:' + colorB + '" type="number" data-tab="' + tabId + '" data-vessel="b" data-idx="' + i + '" value="' + dataB[i] + '" placeholder="—"/></td>' +
      '</tr>';
  }
  return rows;
}

function dataTableHtml(tabId, cfg, st) {
  return '<div class="tblwrap"><table><thead><tr>' +
    '<th>Time (min)</th><th style="color:' + cfg.colorA + '">' + cfg.labelA + ' (°C)</th><th style="color:' + cfg.colorB + '">' + cfg.labelB + ' (°C)</th>' +
    '</tr></thead><tbody id="tbody-' + tabId + '">' + tableRowsHtml(tabId, st.a, st.b, cfg.colorA, cfg.colorB) + '</tbody></table></div>';
}

function firstFilled(arr) {
  for (var i = 0; i < arr.length; i++) { if (arr[i] !== "") return arr[i]; }
  return "";
}
function lastFilled(arr) {
  for (var i = arr.length - 1; i >= 0; i--) { if (arr[i] !== "") return arr[i]; }
  return "";
}

function thermosHtml(tabId, cfg, st, useLast) {
  var valA = useLast ? (lastFilled(st.a) || firstFilled(st.a)) : firstFilled(st.a);
  var valB = useLast ? (lastFilled(st.b) || firstFilled(st.b)) : firstFilled(st.b);
  return '<div class="thermos" id="thermo-' + tabId + '">' +
    thermoGaugeSvg(cfg.labelA, valA, cfg.colorA) +
    thermoGaugeSvg(cfg.labelB, valB, cfg.colorB) +
    '</div>';
}

function chartHtml(tabId, cfg, st) {
  return '<div id="chart-' + tabId + '">' + lineChartSvg(cfg.labelA, cfg.labelB, cfg.colorA, cfg.colorB, st.a, st.b) + '</div>';
}

function blank(field, tabId, key, width) {
  return '<input class="blank" style="width:' + (width || 90) + 'px" data-blankfield="' + field + '" data-tab="' + tabId + '" data-key="' + key + '" value="' + (getBlank(tabId, key) || "") + '"/>';
}
function getBlank(tabId, key) {
  return state[tabId].blanks[key];
}
function selectHtml(tabId, key, options) {
  var opts = '<option value="">choose...</option>';
  for (var i = 0; i < options.length; i++) {
    var o = options[i];
    var sel = state[tabId].analysis[key] === o ? " selected" : "";
    opts += '<option value="' + o + '"' + sel + '>' + o + '</option>';
  }
  return '<select class="blank" data-analysisfield="1" data-tab="' + tabId + '" data-key="' + key + '">' + opts + '</select>';
}

/* ---------- Exp 3 tab ---------- */
function exp3Html() {
  var cfg = CONFIG.exp3, st = state.exp3;
  var analysisRows = [
    { key: "cl", label: "Water in cup Cl" },
    { key: "plastic", label: "Water in the plastic container" }
  ];
  var cols = [
    { key: "temp1", label: "Change in temperature (0–15 min)" },
    { key: "energy1", label: "Change in energy (0–15 min)" },
    { key: "temp2", label: "Change in temperature (15–30 min)" },
    { key: "energy2", label: "Change in energy (15–30 min)" }
  ];
  var opts = ["increased", "decreased", "remained the same"];

  var analysisTable = '<div class="tblwrap"><table><thead><tr><th></th>' +
    cols.map(function (c) { return '<th style="font-size:12px">' + c.label + '</th>'; }).join("") +
    '</tr></thead><tbody>' +
    analysisRows.map(function (r, ri) {
      return '<tr class="' + (ri % 2 ? "odd" : "") + '"><td style="text-align:left;font-family:Inter;font-size:13px">' + r.label + '</td>' +
        cols.map(function (c) { return '<td>' + selectHtml("exp3", r.key + "_" + c.key, opts) + '</td>'; }).join("") +
        '</tr>';
    }).join("") + '</tbody></table></div>';

  return '' +
    '<div class="card"><h2>' + iconSvg("thermo", "#D9603B", 20) + ' Aim</h2>' +
    '<p>To find out that heat flows from a ' + blank("aim", "exp3", "aim1", 90) + ' object to a ' + blank("aim", "exp3", "aim2", 90) + ' object, until both objects reach the same temperature.</p></div>' +

    '<div class="card"><h2>What we need</h2>' +
    '<p>Plastic container &nbsp;•&nbsp; Cup Cl &nbsp;•&nbsp; Thermometer / temperature sensors &nbsp;•&nbsp; Datalogger &nbsp;•&nbsp; Stopwatch</p>' +
    '<p class="muted">Set up cup Cl (with hot water) inside the plastic container (with cooler water). Measure both temperatures every 5 minutes for 30 minutes.</p>' +
    '<div class="imgblock"><img src="' + cfg.image + '" alt="set up"/><div class="imgcap">' + cfg.caption + '</div></div></div>' +

    '<div class="card"><h2>Record your results</h2><div class="recordrow">' +
    thermosHtml("exp3", cfg, st, true) +
    '<div style="flex:1;min-width:300px">' + dataTableHtml("exp3", cfg, st) + '</div></div></div>' +

    '<div class="card"><h2>Your graph</h2>' + chartHtml("exp3", cfg, st) + '</div>' +

    '<div class="card"><h2>What changed?</h2>' + analysisTable + '</div>' +

    '<div class="card"><h2>' + iconSvg("flask", "#4C7A4E", 20) + ' Let\'s conclude</h2>' +
    '<p>The temperature of the water in cup Cl was ' + blank("c", "exp3", "c1") + ' than the temperature of the water in the plastic container.</p>' +
    '<p>Hence, heat flowed from the water in the ' + blank("c", "exp3", "c2", 130) + ' to the water in the ' + blank("c", "exp3", "c3", 150) + '.</p>' +
    '<p>Heat continued to flow until the water in both cup Cl and the plastic container reached the ' + blank("c", "exp3", "c4") + ' temperature.</p>' +
    '<div class="concludeart">' + cfg.sceneSvg + '<div class="imgcap">' + cfg.illustrationCaption + '</div></div></div>';
}

/* ---------- Exp 4 / 5 tab (conductor experiments) ---------- */
function conductorHtml(tabId) {
  var cfg = CONFIG[tabId], st = state[tabId];
  var hotOrCold = cfg.hotOrCold;
  var iconName = hotOrCold === "hot" ? "flame" : "snow";
  var iconColor = hotOrCold === "hot" ? "#D9603B" : "#2F7A93";

  return '' +
    '<div class="card"><h2>' + iconSvg(iconName, iconColor, 20) + ' Aim</h2>' +
    '<p>To identify which cup, C1 or C2, is a good conductor of heat and which is a poor conductor of heat, using ' + hotOrCold + ' water.</p></div>' +

    '<div class="card"><h2>What we need</h2>' +
    '<p>Cup C1 &nbsp;•&nbsp; Cup C2 &nbsp;•&nbsp; Plastic container &nbsp;•&nbsp; Thermometer / temperature sensors &nbsp;•&nbsp; Datalogger &nbsp;•&nbsp; Stopwatch</p>' +
    '<div class="imgblock"><img src="' + cfg.image + '" alt="set up"/><div class="imgcap">' + cfg.caption + '</div></div></div>' +

    '<div class="card"><h2>Predict</h2>' +
    '<p>Which cup, C1 or C2, do you think the ' + hotOrCold + ' water will stay ' + hotOrCold + ' for longer? Cup ' +
    '<input class="blank" style="width:60px" data-predictfield="1" data-tab="' + tabId + '" value="' + (st.predict || "") + '"/></p>' +
    '<p class="muted">Pour 150 ml of ' + hotOrCold + ' water into Cup C1 and 150 ml into Cup C2. Measure both temperatures every 5 minutes for 30 minutes.</p></div>' +

    '<div class="card"><h2>Record your results</h2><div class="recordrow">' +
    thermosHtml(tabId, cfg, st, false) +
    '<div style="flex:1;min-width:300px">' + dataTableHtml(tabId, cfg, st) + '</div></div></div>' +

    '<div class="card"><h2>Your graph</h2>' + chartHtml(tabId, cfg, st) +
    '<p>Based on your graph, which cup did the ' + hotOrCold + ' water stay ' + hotOrCold + ' for longer? Cup ' + blank("c", tabId, "which", 60) + '</p></div>' +

    '<div class="card"><h2>' + iconSvg("flask", "#4C7A4E", 20) + ' Let\'s conclude</h2>' +
    '<p>The ' + hotOrCold + ' water stayed ' + hotOrCold + ' for a longer time in cup ' + blank("c", tabId, "b1", 60) +
    ' because it is a ' + blank("c", tabId, "b2", 90) + ' conductor of heat. Heat passes through cup ' + blank("c", tabId, "b3", 60) +
    ' more slowly than through cup ' + blank("c", tabId, "b4", 60) + '.</p>' +
    '<div class="concludeart">' + cfg.sceneSvg + '<div class="imgcap">' + cfg.illustrationCaption + '</div></div></div>';
}

/* ---------- shell / tabs ---------- */
var TABS = [
  { id: "exp3", label: "Exp 3", sub: "Heat on the Move", icon: "thermo", color: "#1E2A33" },
  { id: "exp4", label: "Exp 4", sub: "Hot Water & Conductors", icon: "flame", color: "#1E2A33" },
  { id: "exp5", label: "Exp 5", sub: "Cold Water & Conductors", icon: "snow", color: "#1E2A33" }
];

function renderShell() {
  var app = document.getElementById("app");
  var tabsHtml = TABS.map(function (t) {
    var active = state.tab === t.id;
    return '<button class="tabbtn' + (active ? " active" : "") + '" data-switchtab="' + t.id + '">' +
      iconSvg(t.icon, active ? "#EAF3F8" : "#1E2A33", 16) +
      '<span>' + t.label + ' <span class="sub2">&middot; ' + t.sub + '</span></span></button>';
  }).join("");

  app.innerHTML =
    '<div class="topbar"><div class="brand"><div class="logo">' + iconSvg("drop", "#F4C97A", 22) + '</div>' +
    '<div><h1>Heat &amp; Temperature Lab</h1><div class="sub">Primary 4 Science &middot; Record your readings, watch the graph draw itself</div></div></div>' +
    '<div class="headerbtns"><span id="saveStatus"></span><button class="resetBtn" id="resetBtn">Reset</button></div></div>' +

    '<div class="metabar">' +
    '<label class="metarow">Name: <input id="metaName" value="' + state.meta.name + '"/></label>' +
    '<label class="metarow">Class: <input id="metaCls" value="' + state.meta.cls + '"/></label>' +
    '<label class="metarow">Date: <input id="metaDate" type="date" value="' + state.meta.date + '"/></label>' +
    '</div>' +

    '<div class="card" style="text-align:center">' + kitIntroSvg() +
    '<p style="text-align:left;max-width:680px;margin:12px auto 0">This kit helps us find out that our sense of touch is not always a reliable way to tell how hot or cold something is. It also lets us investigate how quickly heat moves through different materials.</p></div>' +

    '<div class="tabs">' + tabsHtml + '</div>' +
    '<div id="tabContent"></div>' +

    '<div class="submitwrap"><button class="submitbtn" id="submitBtn">Submit my results</button><span id="submitStatus"></span></div>';

  renderTabContent();
  wireShellEvents();
}

function renderTabContent() {
  var el = document.getElementById("tabContent");
  if (state.tab === "exp3") el.innerHTML = exp3Html();
  else el.innerHTML = conductorHtml(state.tab);
  wireTabEvents();
}

/* ---------- event wiring ---------- */
function wireShellEvents() {
  if (state.submitted) {
    var subEl = document.getElementById("submitStatus");
    if (subEl) subEl.textContent = "Thank you for your submission.";
  }
  document.getElementById("metaName").addEventListener("input", function (e) { state.meta.name = e.target.value; scheduleSave(); });
  document.getElementById("metaCls").addEventListener("input", function (e) { state.meta.cls = e.target.value; scheduleSave(); });
  document.getElementById("metaDate").addEventListener("input", function (e) { state.meta.date = e.target.value; scheduleSave(); });
  document.getElementById("resetBtn").addEventListener("click", resetProgress);
  document.getElementById("submitBtn").addEventListener("click", function () {
    if (!window.confirm("Submit your results? Make sure your name and class are filled in first.")) return;
    state.submitted = true;
    state.submittedAt = new Date().toISOString();
    scheduleSave();
    var el = document.getElementById("submitStatus");
    if (el) el.textContent = "Thank you for your submission.";
  });

  var btns = document.querySelectorAll("[data-switchtab]");
  for (var i = 0; i < btns.length; i++) {
    btns[i].addEventListener("click", function (e) {
      var id = e.currentTarget.getAttribute("data-switchtab");
      state.tab = id;
      scheduleSave();
      renderShell();
    });
  }
}

function wireTabEvents() {
  var inputs = document.querySelectorAll("input.tinput");
  for (var i = 0; i < inputs.length; i++) {
    inputs[i].addEventListener("input", function (e) {
      var tabId = e.target.getAttribute("data-tab");
      var vessel = e.target.getAttribute("data-vessel");
      var idx = Number(e.target.getAttribute("data-idx"));
      state[tabId][vessel][idx] = e.target.value;
      var cfg = CONFIG[tabId];
      document.getElementById("chart-" + tabId).innerHTML = lineChartSvg(cfg.labelA, cfg.labelB, cfg.colorA, cfg.colorB, state[tabId].a, state[tabId].b);
      var thermoEl = document.getElementById("thermo-" + tabId);
      if (thermoEl) {
        var useLast = tabId === "exp3";
        var valA = useLast ? (lastFilled(state[tabId].a) || firstFilled(state[tabId].a)) : firstFilled(state[tabId].a);
        var valB = useLast ? (lastFilled(state[tabId].b) || firstFilled(state[tabId].b)) : firstFilled(state[tabId].b);
        thermoEl.innerHTML = thermoGaugeSvg(cfg.labelA, valA, cfg.colorA) + thermoGaugeSvg(cfg.labelB, valB, cfg.colorB);
      }
      scheduleSave();
    });
  }

  var blanks = document.querySelectorAll("input[data-blankfield]");
  for (var j = 0; j < blanks.length; j++) {
    blanks[j].addEventListener("input", function (e) {
      var tabId = e.target.getAttribute("data-tab");
      var key = e.target.getAttribute("data-key");
      state[tabId].blanks[key] = e.target.value;
      scheduleSave();
    });
  }

  var predicts = document.querySelectorAll("input[data-predictfield]");
  for (var k = 0; k < predicts.length; k++) {
    predicts[k].addEventListener("input", function (e) {
      var tabId = e.target.getAttribute("data-tab");
      state[tabId].predict = e.target.value;
      scheduleSave();
    });
  }

  var selects = document.querySelectorAll("select[data-analysisfield]");
  for (var m = 0; m < selects.length; m++) {
    selects[m].addEventListener("change", function (e) {
      var tabId = e.target.getAttribute("data-tab");
      var key = e.target.getAttribute("data-key");
      state[tabId].analysis[key] = e.target.value;
      scheduleSave();
    });
  }
}

/* ---------- init ---------- */
loadSaved();
renderShell();

</script>
</body>
</html>
